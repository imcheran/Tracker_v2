
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
    <title>Tracker</title>
    
    <!-- Preload Critical Dependencies to prevent Waterfall Loading -->
    <link rel="modulepreload" href="https://esm.sh/react@^19.2.3">
    <link rel="modulepreload" href="https://esm.sh/react-dom@^19.2.3">
    <link rel="modulepreload" href="https://esm.sh/react-dom@^19.2.3/client">
    <link rel="modulepreload" href="https://esm.sh/lucide-react@^0.562.0">
    <link rel="modulepreload" href="https://esm.sh/firebase@10.8.0/app">
    <link rel="modulepreload" href="https://esm.sh/firebase@10.8.0/auth">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'system-ui', 'sans-serif'],
            },
            colors: {
              slate: {
                850: '#1e293b',
                950: '#020617', // Deeper dark
              },
              primary: {
                50: '#eff6ff',
                100: '#dbeafe',
                500: '#3b82f6',
                600: '#2563eb',
                700: '#1d4ed8',
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1)',
              'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1)',
              'scale-in': 'scaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
              'breathe': 'breathe 4s ease-in-out infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 6s ease-in-out infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { transform: 'translateY(30px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              scaleIn: {
                '0%': { transform: 'scale(0.9)', opacity: '0' },
                '100%': { transform: 'scale(1)', opacity: '1' },
              },
              breathe: {
                '0%, 100%': { transform: 'scale(1)' },
                '50%': { transform: 'scale(1.02)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --font-sans: 'Outfit', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        --accent: #6366f1;
        --accent-light: #818cf8;
        --radius-xl: 24px;
        --radius-2xl: 32px;
        --shadow-card: 0 10px 40px -10px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
        --shadow-float: 0 20px 40px -10px rgba(99,102,241,0.25);
      }
      body {
        font-family: var(--font-sans);
        background-color: #f4f6fa;
        color: #0F172A;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overscroll-behavior-y: none;
        touch-action: manipulation;
        margin: 0;
      }
      html.dark body {
        background-color: #020202; /* OLED friendly deep black */
        color: #F8FAFC;
      }

      /* ── Loading Screen ── */
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f0f2ff 0%, #faf5ff 100%);
        z-index: 9999;
        transition: opacity 0.4s ease-out;
      }
      html.dark #initial-loader {
        background: linear-gradient(135deg, #09090b 0%, #0f0f23 100%);
      }
      .loader-spinner {
        width: 52px;
        height: 52px;
        border: 3px solid rgba(99,102,241,0.15);
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
        margin-bottom: 20px;
        box-shadow: 0 0 20px rgba(99,102,241,0.2);
      }
      .loader-text {
        font-weight: 700;
        font-size: 1.25rem;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        opacity: 0;
        animation: fadeInUp 0.5s ease-out 0.3s forwards;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar { width: 0; background: transparent; }
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(99,102,241,0.2);
        border-radius: 99px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(99,102,241,0.4);
      }

      /* ── Safe Area ── */
      .pt-safe { padding-top: env(safe-area-inset-top); }
      .pb-safe { padding-bottom: env(safe-area-inset-bottom); }

      /* ── Glass ── */
      .glass {
        background: rgba(255,255,255,0.65);
        backdrop-filter: blur(24px) saturate(200%);
        -webkit-backdrop-filter: blur(24px) saturate(200%);
        border: 1px solid rgba(255,255,255,0.7);
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.5);
      }
      html.dark .glass {
        background: rgba(15,17,30,0.5);
        backdrop-filter: blur(24px) saturate(200%);
        -webkit-backdrop-filter: blur(24px) saturate(200%);
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
      }

      /* ── Bento Cards ── */
      .bento-card {
        transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                    box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                    border-color 0.4s ease;
        will-change: transform;
      }
      .bento-card:hover {
        transform: translateY(-4px) scale(1.02);
        box-shadow: var(--shadow-float);
      }
      .bento-card:active { transform: scale(0.98); }

      /* ── Sidebar nav item active pill ── */
      .nav-item-active {
        background: linear-gradient(135deg, rgba(99,102,241,0.12), rgba(139,92,246,0.08));
        color: #6366f1;
        border-left: 3px solid #6366f1;
      }
      html.dark .nav-item-active {
        background: rgba(99,102,241,0.18);
        color: #818cf8;
        border-left-color: #818cf8;
      }

      /* ── Floating Mobile Nav ── */
      .mobile-nav-float {
        background: rgba(255,255,255,0.88);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border: 1px solid rgba(255,255,255,0.6);
        box-shadow: 0 8px 32px -4px rgba(99,102,241,0.18), 0 2px 8px rgba(0,0,0,0.06);
      }
      html.dark .mobile-nav-float {
        background: rgba(15,17,30,0.85);
        border-color: rgba(255,255,255,0.08);
        box-shadow: 0 8px 32px -4px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.2);
      }

      /* ── Priority badge colors ── */
      .priority-urgent { background: #fef2f2; color: #ef4444; }
      .priority-high    { background: #fff7ed; color: #f97316; }
      .priority-medium  { background: #fefce8; color: #eab308; }
      .priority-low     { background: #f0fdf4; color: #22c55e; }
      html.dark .priority-urgent { background: rgba(239,68,68,0.15); color: #f87171; }
      html.dark .priority-high   { background: rgba(249,115,22,0.15); color: #fb923c; }
      html.dark .priority-medium { background: rgba(234,179,8,0.15);  color: #facc15; }
      html.dark .priority-low    { background: rgba(34,197,94,0.15);  color: #4ade80; }

      /* ── Animations ── */
      @keyframes fadeIn  { from { opacity:0 } to { opacity:1 } }
      @keyframes slideUp { from { transform:translateY(16px); opacity:0 } to { transform:translateY(0); opacity:1 } }
      @keyframes scaleIn { from { transform:scale(0.94); opacity:0 } to { transform:scale(1); opacity:1 } }
      @keyframes breathe { 0%,100% { transform:scale(1) } 50% { transform:scale(1.025) } }

      .animate-fade-in  { animation: fadeIn  0.35s cubic-bezier(0.2,0.8,0.2,1) both; }
      .animate-slide-up { animation: slideUp 0.45s cubic-bezier(0.2,0.8,0.2,1) both; }
      .animate-scale-in { animation: scaleIn 0.3s  cubic-bezier(0.2,0.8,0.2,1) both; }
      .animate-breathe  { animation: breathe 4s ease-in-out infinite; }

      /* ── Focus ring ── */
      *:focus-visible {
        outline: 2px solid #6366f1;
        outline-offset: 2px;
        border-radius: 6px;
      }

      /* ── Input / button base ── */
      input, textarea, select {
        font-family: var(--font-sans);
      }
      button { cursor: pointer; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react-dom/client": "https://esm.sh/react-dom@^19.2.3/client",
    "date-fns": "https://esm.sh/date-fns@^4.1.0",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "firebase/app": "https://esm.sh/firebase@10.8.0/app",
    "firebase/auth": "https://esm.sh/firebase@10.8.0/auth",
    "firebase/analytics": "https://esm.sh/firebase@10.8.0/analytics",
    "firebase/firestore": "https://esm.sh/firebase@10.8.0/firestore",
    "@capacitor/core": "https://esm.sh/@capacitor/core@^6.0.0",
    "@capacitor/app": "https://esm.sh/@capacitor/app@^6.0.0",
    "@capacitor/cli": "https://esm.sh/@capacitor/cli@^6.0.0",
    "@capawesome/capacitor-live-update": "https://esm.sh/@capawesome/capacitor-live-update@^6.0.0",
    "@codetrix-studio/capacitor-google-auth": "https://esm.sh/@codetrix-studio/capacitor-google-auth@^3.4.0-rc.4",
    "@capacitor/preferences": "https://esm.sh/@capacitor/preferences@^6.0.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "firebase/": "https://esm.sh/firebase@10.8.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root">
        <div id="initial-loader">
            <div class="loader-spinner"></div>
            <div class="loader-text">Tracker</div>
        </div>
        <script>
            try {
                const stored = localStorage.getItem('ticktick_clone_theme');
                if (stored === '"dark"' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    document.documentElement.classList.add('dark');
                }
            } catch(e) {}
        </script>
    </div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
